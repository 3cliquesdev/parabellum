<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Build ID para detecção de versão -->
    <meta name="app-build-id" content="__BUILD_PLACEHOLDER__" />
    
    <!-- Cache Control - Força revalidação agressiva -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Build ID disponível para verificação manual via SidebarVersionIndicator -->
    
    <title>Parabellum</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    
    <!-- Preload LCP image for faster discovery -->
    <link rel="preload" href="/logo-parabellum-light.png" as="image" fetchpriority="high" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2563EB" />
    
    <!-- SOLUÇÃO NUCLEAR: FORÇAR DARK MODE -->
    <style>
      html, body, #root {
        background-color: #000000 !important;
        color: #ffffff !important;
      }
      /* Garante que se algo tiver bg-white, será ignorado */
      .bg-white {
        background-color: #000000 !important;
      }
    </style>
    <script>
      // Script de bloqueio imediato
      document.documentElement.classList.add('dark');
      document.documentElement.style.colorScheme = 'dark';
    </script>

    <!-- Anti-cache de PWA: remove Service Worker ANTES do app iniciar (evita publicado preso em "Carregando...") -->
    <script>
      (function () {
        try {
          if (!('serviceWorker' in navigator)) return;
          
          var hasController = !!navigator.serviceWorker.controller;
          var key = 'sw_clean_v2';  // Nova chave para evitar conflito com versões anteriores
          
          // Limpar SW de forma assíncrona (não bloqueia carregamento)
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          });
          
          // Reload apenas se estava sendo controlado por SW antigo e ainda não fez reload
          if (hasController && !sessionStorage.getItem(key)) {
            sessionStorage.setItem(key, '1');
            setTimeout(function() { location.reload(); }, 100);
          }
        } catch (e) {
          // Silencioso
        }
      })();
    </script>
    <meta name="description" content="CRM moderno com caixa de entrada unificada para gerenciar contatos, organizações, negócios e conversas" />
    <meta name="author" content="Lovable" />
    <!-- Preconnect hints for critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://zaeozfdjhrmblfaxsyuu.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://zaeozfdjhrmblfaxsyuu.supabase.co" />
    <!-- Optimized font loading - only Inter for critical rendering -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>
    <!-- Load other fonts async after page load -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@400;700&family=Raleway:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />

    <meta property="og:title" content="CRM - Gestão de Relacionamento com Clientes" />
    <meta property="og:description" content="CRM moderno com caixa de entrada unificada para gerenciar contatos, organizações, negócios e conversas" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
