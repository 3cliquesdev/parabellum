<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Build ID para detecção de versão -->
    <meta name="app-build-id" content="__BUILD_PLACEHOLDER__" />
    
    <!-- Cache Control - Força revalidação agressiva -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- SCRIPT NUCLEAR: Verifica versão ANTES do React carregar -->
    <script>
      (function() {
        var CHECK_KEY = 'nuclear_version_check';
        var BUILD_META = document.querySelector('meta[name="app-build-id"]');
        var currentBuild = BUILD_META ? BUILD_META.content : 'unknown';
        
        // Evita loop infinito (máximo 2 tentativas)
        var attempts = parseInt(sessionStorage.getItem(CHECK_KEY) || '0');
        if (attempts >= 2) {
          console.log('[Nuclear] Max attempts reached, stopping');
          sessionStorage.removeItem(CHECK_KEY);
          return;
        }
        
        // Busca HTML fresco do servidor
        fetch('/index.html?_nc=' + Date.now(), {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache' }
        })
        .then(function(r) { return r.text(); })
        .then(function(html) {
          var match = html.match(/app-build-id.*content="([^"]+)"/);
          var serverBuild = match ? match[1] : 'unknown';
          
          if (serverBuild !== '__BUILD_PLACEHOLDER__' && 
              serverBuild !== currentBuild && 
              currentBuild !== '__BUILD_PLACEHOLDER__') {
            console.warn('[Nuclear] ⚠️ VERSÃO ANTIGA! Forçando reload...');
            console.warn('[Nuclear] Local:', currentBuild, '| Servidor:', serverBuild);
            
            // Incrementa contador
            sessionStorage.setItem(CHECK_KEY, String(attempts + 1));
            
            // Limpa caches se disponível
            if ('caches' in window) {
              caches.keys().then(function(names) {
                names.forEach(function(name) { caches.delete(name); });
              });
            }
            
            // Força reload agressivo
            location.replace(location.pathname + '?_force=' + Date.now());
          } else {
            // Versão ok, limpa contador
            sessionStorage.removeItem(CHECK_KEY);
          }
        })
        .catch(function(e) {
          console.warn('[Nuclear] Erro na verificação:', e);
        });
      })();
    </script>
    
    <title>Parabellum</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    
    <!-- Preload LCP image for faster discovery -->
    <link rel="preload" href="/logo-parabellum-light.png" as="image" fetchpriority="high" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2563EB" />
    
    <!-- SOLUÇÃO NUCLEAR: FORÇAR DARK MODE -->
    <style>
      html, body, #root {
        background-color: #000000 !important;
        color: #ffffff !important;
      }
      /* Garante que se algo tiver bg-white, será ignorado */
      .bg-white {
        background-color: #000000 !important;
      }
    </style>
    <script>
      // Script de bloqueio imediato
      document.documentElement.classList.add('dark');
      document.documentElement.style.colorScheme = 'dark';
    </script>
    <meta name="description" content="CRM moderno com caixa de entrada unificada para gerenciar contatos, organizações, negócios e conversas" />
    <meta name="author" content="Lovable" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
